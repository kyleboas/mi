# Installed as /etc/litellm/config.yaml by the tracked production installer.
# Only durable production aliases belong in this canonical configuration.
model_list:
  - model_name: coding-main
    litellm_params:
      model: pi-subscription/coding-main
      api_key: ""
  # Mi's production foreground route. This immutable profile is Sol medium;
  # shared coding-main above deliberately remains its historical high route.
  - model_name: mi-concierge
    litellm_params:
      model: pi-subscription/mi-concierge
      api_key: ""
litellm_settings:
  drop_params: true
  telemetry: false
  custom_provider_map:
    - provider: pi-subscription
      custom_handler: pi_subscription_handler.pi_subscription_llm
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
